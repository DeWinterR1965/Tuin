<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <title>Interactieve Tuin (Google Sheets)</title>
  <style>
    body { 
      font-family: system-ui,-apple-system,BlinkMacSystemFont,sans-serif; 
      padding:20px; 
      background: url('achtergrond.jpg') center/cover no-repeat fixed; 
    }
    h1 { margin-bottom:5px; }
    #controls { margin-bottom:10px; display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    button { padding:8px 14px; border:none; border-radius:8px; background:#2563eb; color:white; cursor:pointer; font-size:14px; box-shadow:0 6px 14px -4px rgba(37,99,235,.35); flex-shrink:0; }
    button.secondary { background:#6b7280; }
    #tuin-wrapper { position:relative; width:90%; aspect-ratio:741/1193; max-width:100vw; border-radius:8px; overflow:hidden; margin-bottom:18px; margin-left:auto; margin-right:auto; border:2px solid transparent; transition:border-color 0.3s ease; user-select:none; }
    #tuin-wrapper.editing { border-color:#dc2626; box-shadow:0 0 12px 2px rgba(220,38,38,0.4); }
	#tuin-wrapper.editing .plant-wrapper .delete-btn {
      display: block;
    }
    #tuin-container { width:100%; height:100%; }
    #tuin { position:relative; width:100%; height:100%; background:url('grondplan_tuin.jpg') center/cover no-repeat; cursor:default; }
    .plant { position:absolute; width:18px; height:18px; display:flex; align-items:center; justify-content:center; border-radius:50%; font-size:16px; color:white; user-select:none; box-shadow:0 4px 12px rgba(0,0,0,.25); transition:transform .15s; }
    .plant:hover { transform:scale(1.1); }
    .tooltip { position:absolute; background:white; padding:10px; border-radius:8px; box-shadow:0 6px 18px rgba(0,0,0,.2); font-size:13px; pointer-events:none; z-index:50; max-width:240px; border:1px solid #ccc; }
    .delete-btn { position:absolute; top:-6px; right:-6px; background:#ef4444; width:16px; height:16px; border-radius:50%; font-size:12px; line-height:16px; text-align:center; cursor:pointer; color:white; border:2px solid white; display:none; user-select:none; }
    .plant-wrapper { position:absolute; transform:translate(-50%,-50%); }
    .type-label { display:inline-flex; gap:6px; align-items:center; }
    .legend-dot { width:16px; height:16px; border-radius:50%; display:inline-block; margin-right:4px; }
    #form-popup { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:16px 18px; border-radius:10px; box-shadow:0 18px 48px -4px rgba(0,0,0,.35); z-index:200; width:340px; display:none; font-size:14px; }
    #form-popup label { display:block; margin-top:8px; }
    #form-popup input[type="text"], #form-popup textarea, #form-popup select, #form-popup input[type="color"] { width:100%; padding:6px 8px; border:1px solid #bbb; border-radius:6px; font-size:14px; box-sizing:border-box; }
    #form-popup img { max-width:100%; border-radius:6px; margin-top:6px; display:block; }
    .flex-row { display:flex; gap:8px; align-items:center; }
    .small { font-size:12px; color:#555; }
    #gallery { margin-top:10px; }
    .gallery-grid { display:flex; flex-direction:column; gap:24px; }
    .card { background:white; border-radius:8px; padding:10px; box-shadow:0 8px 24px rgba(0,0,0,.08); display:flex; flex-direction:column; align-items:center; cursor:pointer; width:140px; margin-bottom:6px; }
    .card img { width:100%; aspect-ratio:4/3; object-fit:cover; border-radius:6px; display:block; margin-bottom:6px; }
    .card .meta { font-size:14px; font-weight:600; text-align:center; color:black !important; text-shadow:none !important; }
    .card .small { font-size:12px; color:#555; text-align:center; margin-top:4px; color:black !important; text-shadow:none !important; }
    #filter-wrapper { flex:1; min-width:180px; }
    #filter-input { padding:6px 10px; border-radius:6px; border:1px solid #888; width:100%; box-sizing:border-box; font-size:14px; }
    #zoom-controls { margin:10px 0 18px 0; display:flex; gap:10px; }
    .white-text { color:white; text-shadow:1px 1px 3px rgba(0,0,0,0.8); }
  </style>

  <!-- Pan/Zoom -->
  <script src="https://unpkg.com/@panzoom/panzoom/dist/panzoom.min.js"></script>
</head>
<body>

<h1 class="white-text">De Wintertuin</h1>

<div id="loading-overlay" style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:24px;
  z-index:9999;
">
  Loading data...
</div>



<div id="controls">
  <button id="saveCloudBtn">Opslaan (Google Sheet)</button>
  <button class="secondary" id="loadCloudBtn">Laden (Google Sheet)</button>
  <button id="editMapBtn">Edit map</button>

  <div id="filter-wrapper">
    <label for="filter-input" class="white-text"><strong>Filter op naam:</strong></label>
    <input type="text" id="filter-input" placeholder="Bijv. Lavendel" />
  </div>

  <div id="legende" class="white-text">
    <label><strong>Legende:</strong></label>
    <span style="display:inline-flex; gap:12px; align-items:center; margin-left:6px;">
      <span class="type-label"><span class="legend-dot" style="background:#ef4444;"></span> Roos</span>
      <span class="type-label"><span class="legend-dot" style="background:#ca8a04;"></span> Struik</span>
      <span class="type-label"><span class="legend-dot" style="background:#22c55e;"></span> Vaste plant</span>
      <span class="type-label"><span class="legend-dot" style="background:#16a34a;"></span> Boom</span>
      <span class="type-label"><span class="legend-dot" style="background:#0f172a;"></span> Andere</span>
    </span>
  </div>
</div>

<div id="zoom-controls">
  <button onclick="zoomIn()">➕ Zoom in</button>
  <button onclick="zoomOut()">➖ Zoom uit</button>
  <button onclick="resetZoom()">🔄 Reset</button>
</div>

<div id="tuin-wrapper">
  <div id="tuin-container">
    <div id="tuin" onclick="handleClick(event)"></div>
  </div>
</div>

<div id="form-popup">
  <h3 style="margin:0 0 6px 0;">Plant toevoegen / bewerken</h3>
  <div>
    <label>Naam</label>
    <input type="text" id="input-name" placeholder="Bijv. Lavendel" />
    <label>Type</label>
    <select id="input-type">
      <option value="roos">Roos</option>
      <option value="struik">Struik</option>
      <option value="vasteplant">Vaste plant</option>
      <option value="boom">Boom</option>
      <option value="anders">Andere</option>
    </select>
    <label>Kleur</label>
    <input type="color" id="input-color" value="#16a34a" />
    <label>Extra info</label>
    <textarea id="input-extra" rows="2" placeholder="Bv. houdt van zon"></textarea>
    <label>Foto (optioneel)</label>
    <div class="flex-row">
      <input type="file" id="input-photo" accept="image/*" />
    </div>
    <div id="photo-preview"></div>
    <div style="margin-top:12px; display:flex; gap:8px; justify-content:flex-end;">
      <button id="savePlantBtn">Opslaan</button>
      <button id="cancelBtn" class="secondary">Annuleren</button>
    </div>
    <div class="small" style="margin-top:8px;">Klik op een plant om te bewerken; hover toont details; rode × verwijdert.</div>
  </div>
</div>

<template id="plant-template">
  <div class="plant-wrapper">
    <div class="plant"></div>
    <div class="delete-btn">&times;</div>
  </div>
</template>

<div id="gallery" class="white-text">
  <h2 class="white-text">Galerij van planten</h2>
  <div class="gallery-grid" id="gallery-grid"></div>
</div>

<script>
const SPREADSHEET_ID = "1_k-3n7cjGRjoS22fJMliRfj_z4pB_rTRx3um_5ydlKs";
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbycfErQszIYrDwAN55DJonBdknBpy6K3jY9SLEpZliuj0WmPW2AO7g3jrW4MwGzYwKicg/exec";

let plants = [];
let editingId = null;
let tempPos = null;
let editMode = false;
let tooltip = null;

const typeMeta = {
  roos:{color:'#ef4444',icon:'🌹'},
  struik:{color:'#ca8a04',icon:'🌳'},
  vasteplant:{color:'#22c55e',icon:'🌿'},
  boom:{color:'#16a34a',icon:'🌲'},
  anders:{color:'#0f172a',icon:'🌱'}
};

const tuinEl = document.getElementById('tuin');
const tuinWrapper = document.getElementById('tuin-wrapper');
const form = document.getElementById('form-popup');
const inputName = document.getElementById('input-name');
const inputType = document.getElementById('input-type');
const inputColor = document.getElementById('input-color');
const inputExtra = document.getElementById('input-extra');
const inputPhoto = document.getElementById('input-photo');
const photoPreview = document.getElementById('photo-preview');
const savePlantBtn = document.getElementById('savePlantBtn');
const cancelBtn = document.getElementById('cancelBtn');
const saveCloudBtn = document.getElementById('saveCloudBtn');
const loadCloudBtn = document.getElementById('loadCloudBtn');
const filterInput = document.getElementById('filter-input');
const galleryGrid = document.getElementById('gallery-grid');
const editMapBtn = document.getElementById('editMapBtn');

function showTooltip(html, wrapper){
  if(!tooltip){
    tooltip = document.createElement('div');
    tooltip.className = 'tooltip';
    document.body.appendChild(tooltip);
  }

  tooltip.innerHTML = html;
  tooltip.style.display = 'block';

  const rect = wrapper.getBoundingClientRect();
  const ttRect = tooltip.getBoundingClientRect();
  const scrollX = window.scrollX || window.pageXOffset;
  const scrollY = window.scrollY || window.pageYOffset;

  // Standaard rechts van de plant
  let left = rect.right + 6 + scrollX;
  let top = rect.top + scrollY;

  // Als tooltip buiten viewport rechts valt, links plaatsen
  if(left + ttRect.width > window.innerWidth + scrollX){
    left = rect.left - ttRect.width - 6 + scrollX;
  }

  // Als tooltip onderkant buiten viewport valt, boven plant plaatsen
  if(top + ttRect.height > window.innerHeight + scrollY){
    top = rect.bottom - ttRect.height + scrollY;
  }

  // Als tooltip bovenkant nog boven viewport, naar boven minimaliseren
  if(top < scrollY) top = scrollY + 5;

  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}

function hideTooltip(){ if(tooltip) tooltip.style.display='none'; }

function handleClick(event){
  if(!editMode) return;
  const rect=tuinEl.getBoundingClientRect();
  tempPos={ x:(event.clientX-rect.left)/rect.width, y:(event.clientY-rect.top)/rect.height };
  openForm();
}

function openForm(plant=null){
  if(plant){
    editingId=plant.id;
    inputName.value=plant.name;
    inputType.value=plant.type;
    inputColor.value=plant.color||typeMeta[plant.type]?.color||'#000000';
    inputExtra.value=plant.extra||'';
    photoPreview.innerHTML=plant.photo?`<img src="${plant.photo}" alt="foto" />`:'';
  }else{
    editingId=null;
    inputName.value=''; inputType.value='boom';
    inputColor.value=typeMeta['boom'].color;
    inputExtra.value=''; photoPreview.innerHTML='';
  }
  inputPhoto.value=''; delete inputPhoto.dataset.photo;
  form.style.display='block';
}
function closeForm(){ form.style.display='none'; tempPos=null; editingId=null; }

inputPhoto.addEventListener('change', e=>{
  const file = e.target.files[0]; 
  if(!file) return;

  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX_WIDTH = 150;
      const scale = Math.min(MAX_WIDTH / img.width, 1);
      const canvas = document.createElement('canvas');
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const resizedDataUrl = canvas.toDataURL('image/png');
      photoPreview.innerHTML = `<img src="${resizedDataUrl}" alt="foto" />`;
      inputPhoto.dataset.photo = resizedDataUrl;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

savePlantBtn.addEventListener('click', ()=>{
  const name=inputName.value.trim(); if(!name){ alert("Geef een naam."); return; }
  const type=inputType.value;
  const extra=inputExtra.value.trim();
  const photo=inputPhoto.dataset.photo || (photoPreview.querySelector('img') ? photoPreview.querySelector('img').src : '');
  const color=inputColor.value;
  if(editingId){
    const p=plants.find(p=>p.id===editingId); if(!p) return;
    p.name=name; p.type=type; p.extra=extra; p.photo=photo; p.color=color;
  }else if(tempPos){
    plants.push({ id:crypto.randomUUID(), name, type, extra, photo, color, x:tempPos.x, y:tempPos.y, created:Date.now() });
  }
  refreshAll(); closeForm();
});

cancelBtn.addEventListener('click', e=>{ e.preventDefault(); closeForm(); });

function renderPlant(plant){
  const tpl=document.getElementById('plant-template');
  const wrapper=tpl.content.firstElementChild.cloneNode(true);
  const plantEl=wrapper.querySelector('.plant');
  const del=wrapper.querySelector('.delete-btn');
  const meta=typeMeta[plant.type]||typeMeta['anders'];
  plantEl.style.background=plant.color||meta.color;
  plantEl.textContent=meta.icon;
  wrapper.style.left=`${plant.x*100}%`;
  wrapper.style.top=`${plant.y*100}%`;
  wrapper.style.transform='translate(-50%,-50%)';
  plantEl.setAttribute('data-id',plant.id);

  wrapper.addEventListener('mouseenter',()=>{
  let html = `<div><strong>${plant.name}</strong> (${plant.type})</div>`;
  if(plant.extra) html += `<div style="margin-top:4px;">${plant.extra}</div>`;
  if(plant.photo) html += `<div style="margin-top:6px;"><img src="${plant.photo}" style="max-width:120px;border-radius:6px;"></div>`;
  showTooltip(html, wrapper);
});

  wrapper.addEventListener('mouseleave', hideTooltip);
  plantEl.addEventListener('click', e=>{ e.stopPropagation(); openForm(plant); });
  del.addEventListener('click', e => { 
    e.stopPropagation(); 
    if (!editMode) return;
    removePlant(plant.id); 
  });
  wrapper.dataset.name=plant.name.toLowerCase();
  wrapper.dataset.type=plant.type;
  tuinEl.appendChild(wrapper);
}

function refreshAll(){ tuinEl.innerHTML=''; plants.forEach(renderPlant); refreshGallery(); applyFilter(); }
function removePlant(id){ plants=plants.filter(p=>p.id!==id); refreshAll(); }

filterInput.addEventListener('input', applyFilter);
function applyFilter(){
  const val=filterInput.value.trim().toLowerCase();
  tuinEl.querySelectorAll('.plant-wrapper').forEach(w=>{
    w.style.display=(w.dataset.name||'').includes(val)?'':'none';
  });
  refreshGallery(val);
}

function refreshGallery(filterVal=''){
  galleryGrid.innerHTML='';

  const types = ['roos','struik','vasteplant','boom','anders'];

  types.forEach(type=>{
    const filteredPlants = plants.filter(p => p.type === type && p.name.toLowerCase().includes(filterVal));
    if(filteredPlants.length === 0) return;

    const typeContainer = document.createElement('div');
    typeContainer.className = 'gallery-type';
    
    const h3 = document.createElement('h3');
    h3.textContent = type.charAt(0).toUpperCase() + type.slice(1); // bv 'Roos'
    h3.className = 'white-text';
    typeContainer.appendChild(h3);

    // Container voor kaarten van dit type
    const cardRow = document.createElement('div');
    cardRow.style.display = 'flex';
    cardRow.style.flexWrap = 'wrap';
    cardRow.style.gap = '12px';
    cardRow.style.marginBottom = '18px'; // ruimte tussen types

    filteredPlants.forEach(p=>{
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = p.photo
        ? `<img src="${p.photo}" alt="foto" />`
        : '<div style="height:90px;background:#ddd;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#666;">Geen foto</div>';
      const meta = typeMeta[p.type] || typeMeta['anders'];
      const colorDot = `<span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:${p.color||meta.color};margin-right:6px;"></span>`;
      card.innerHTML += `<div class="meta">${colorDot}${p.name}</div>`;
      if(p.extra) card.innerHTML += `<div class="small">${p.extra}</div>`;

      card.addEventListener('click',()=>openForm(p));

      cardRow.appendChild(card);
    });

    typeContainer.appendChild(cardRow);
    galleryGrid.appendChild(typeContainer);
  });
}





inputType.addEventListener('change', ()=>{ inputColor.value=typeMeta[inputType.value]?.color||'#000000'; });

const panzoomInstance=Panzoom(document.getElementById('tuin-container'),{ maxScale:3, minScale:0.5, contain:'outside' });
function zoomIn(){ panzoomInstance.zoomIn(); }
function zoomOut(){ panzoomInstance.zoomOut(); }
function resetZoom(){ panzoomInstance.reset(); }

editMapBtn.addEventListener('click', ()=>{
  editMode=!editMode;
  if(editMode){
    editMapBtn.textContent='Stop Edit';
    editMapBtn.style.backgroundColor='#dc2626';
    tuinWrapper.classList.add('editing');
    tuinEl.style.cursor='crosshair';
  }else{
    editMapBtn.textContent='Edit map';
    editMapBtn.style.backgroundColor='#2563eb';
    tuinWrapper.classList.remove('editing');
    tuinEl.style.cursor='default';
    closeForm();
  }
});

async function loadFromSheet(){
  try{
    const resp = await fetch(WEB_APP_URL);
    const data = await resp.json();
    plants = (data.data || []).map(d => ({
      id: d.id || crypto.randomUUID(),
      name: d.name,
      type: d.type,
      color: d.color,
      extra: d.extra,
      photo: d.photo,
      x: parseFloat(d.x),
      y: parseFloat(d.y),
      created: d.created ? parseInt(d.created) : Date.now()
    }));
    refreshAll();
    document.getElementById('loading-overlay').style.display = 'none'; // overlay verbergen
    alert('Data geladen van Google Sheet ✅');
  }catch(err){
    console.error(err);
    document.getElementById('loading-overlay').style.display = 'none'; // overlay verbergen bij fout
    alert('Laden van Google Sheet mislukt ❌');
  }
}


async function saveToSheet(){
  try{
    await fetch(WEB_APP_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body: JSON.stringify(plants)
    });
    alert('Data opgeslagen in Google Sheet ✅');
  }catch(err){ console.error(err); alert('Fout bij opslaan naar Google Sheet ❌'); }
}

saveCloudBtn.addEventListener('click', saveToSheet);
loadCloudBtn.addEventListener('click', loadFromSheet);

loadFromSheet();

window.handleClick = handleClick;
window.zoomIn = zoomIn;
window.zoomOut = zoomOut;
window.resetZoom = resetZoom;
</script>

</body>
</html>
