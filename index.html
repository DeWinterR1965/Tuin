<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <title>De Wintertuin - Finale Fix</title>
  <style>
    body { font-family: system-ui, sans-serif; padding:20px; background: url('achtergrond.JPG') center/cover no-repeat fixed; }
    #controls { margin-bottom:10px; display:flex; flex-wrap:wrap; gap:15px; align-items:center; z-index: 2000; position: relative; }
    button { padding:8px 14px; border:none; border-radius:8px; background:#2563eb; color:white; cursor:pointer; font-size:14px; box-shadow:0 4px 6px rgba(0,0,0,0.1); }
    
    #tuin-wrapper { 
      position:relative; width:90%; aspect-ratio:741/1193; max-width:100vw; 
      border-radius:8px; overflow:hidden; margin: 0 auto 18px auto; 
      border:4px solid transparent; user-select:none; 
	  container-type: inline-size;
    }
    #tuin-wrapper.editing { border-color:#dc2626; }
    #tuin-container { width:100%; height:100%; touch-action: none; }
    #tuin { position:relative; width:100%; height:100%; background:url('grondplan_tuin.jpg') center/cover no-repeat; }
 

	/* Nieuwe stijl om de bovenkant vast te zetten */
    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 5000; /* Zorgt dat het boven de planten blijft */
      background: rgba(0, 0, 0, 0.4); /* Subtiele donkere waas voor leesbaarheid */
      backdrop-filter: blur(8px); /* Mooi modern 'glass' effect */
      padding: 10px 20px;
      margin: -20px -20px 20px -20px; /* Compenseert de padding van de body */
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Zorg dat de titel minder ruimte inneemt zodat alles op één regel past indien nodig */
    h1.white-text { 
      margin: 0 0 10px 0; 
      font-size: 24px; 
    }
	
    .plant-wrapper { position:absolute; transform:translate(-50%,-50%); z-index: 100; pointer-events: auto; }
	.plant { 
      display:flex; align-items:center; justify-content:center; 
      border-radius:50%; color:white; cursor: pointer;
      /* Aquarel effect: zachte rand en glow */
      border: 1.5px solid rgba(255,255,255,0.6);
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
      transition: transform 0.2s;
      font-weight: bold;
    }

    .legend-dot { 
      width:14px; height:14px; border-radius:50%; display:inline-block; 
      opacity: 0.65; /* Matcht met de kaart */
      border: 1px solid white;
    }
	.legend-circle {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2); /* Subtiele witte glans */
      border: 1.5px solid white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 12px;
      margin-right: 6px;
      color: white;
    }
    
    .type-label { 
      display: inline-flex; 
      align-items: center; 
      margin-right: 15px; 
      font-size: 14px; 
      font-weight: 500;
    }

    .tooltip { position:absolute; background:white; padding:10px; border-radius:8px; box-shadow:0 6px 18px rgba(0,0,0,.2); font-size:13px; pointer-events:none; z-index:4000; display:none; border:1px solid #ccc; max-width:240px; color: #333; }
    
    .delete-btn { position:absolute; top:-10px; right:-10px; background:#ef4444; width:20px; height:20px; border-radius:50%; font-size:14px; color:white; text-align:center; cursor:pointer; display:none; border:2px solid white; line-height:18px; }
    #tuin-wrapper.editing .delete-btn { display: block; }

	#form-popup { 
      position: fixed; 
      top: 130px; /* Verhoogd van 20px naar 130px zodat hij onder de balk valt */
      right: 20px; 
      background: white; 
      padding: 20px; 
      border-radius: 12px; 
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
      z-index: 6000; /* Verhoogd naar 6000 om boven de sticky-header (5000) te blijven */
      width: 300px; 
      display: none; 
      transition: opacity 0.2s; 
    }
 
    #form-popup h3 { margin:0 0 10px 0; font-size:18px; }
    #form-popup label { display:block; margin-top:10px; font-weight:500; font-size: 14px; }
    #form-popup input[type="text"], #form-popup textarea, #form-popup select, #form-popup input[type="range"] { width:100%; margin-top:4px; padding:8px; box-sizing: border-box; border:1px solid #ccc; border-radius:6px; font-size: 14px; }
    #form-popup input[type="color"] { width:100%; height: 30px; border:none; border-radius:6px; background: none; cursor: pointer; margin-top: 4px; }
    #form-popup img { max-width: 150px; border-radius: 8px; margin-top: 10px; display: block; }
    .form-buttons { display:flex; gap:10px; justify-content:flex-end; margin-top:15px; }

    .white-text { color:white; text-shadow:1px 1px 3px rgba(0,0,0,0.8); }
    
    .gallery-grid { 
      display: block; 
      padding: 0 20px 40px 20px; 
    }
    .card { background:white; border-radius:8px; padding:10px; box-shadow:0 8px 24px rgba(0,0,0,.08); display:flex; flex-direction:column; align-items:center; cursor:pointer; width:140px; }
    .card img { width:100%; aspect-ratio:4/3; object-fit:cover; border-radius:8px; display:block; margin-bottom:6px; }
    
    .no-photo-placeholder { width:100%; aspect-ratio:4/3; background-color:#dcdcdc; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#4b5563; font-size:18px; font-weight:500; margin-bottom:6px; }
    .meta { font-size:14px; font-weight:600; color:black; display:flex; align-items:center; justify-content:center; }
  </style>
  <script src="https://unpkg.com/@panzoom/panzoom/dist/panzoom.min.js"></script>
</head>
<body>

<div id="loading-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; color:white; font-size:24px; z-index:9999;">Laden...</div>

<div class="sticky-header">
  <h1 class="white-text">De Wintertuin</h1>

  <div id="controls">
    <button id="editMapBtn">Edit map (Slepen & Toevoegen)</button>
    <button id="saveCloudBtn">Opslaan (Google Sheet)</button>
    
    <div id="filter-wrapper">
      <label for="filter-input" class="white-text"><strong>Filter:</strong></label>
      <input type="text" id="filter-input" placeholder="Zoek plant..." style="padding:8px; border-radius:8px; border:none; width:130px;">
    </div>

    <div id="legende" class="white-text">
      <label><strong>Legende:</strong></label>
      <span style="display:inline-flex; flex-wrap:wrap; gap:5px; margin-left:12px;">
        <span class="type-label"><span class="legend-circle">R</span> Roos</span>
        <span class="type-label"><span class="legend-circle">S</span> Struik</span>
        <span class="type-label"><span class="legend-circle">V</span> Vaste plant</span>
        <span class="type-label"><span class="legend-circle">B</span> Boom</span>
        <span class="type-label"><span class="legend-circle">A</span> Andere</span>
      </span>
    </div>
  </div>
</div>



<div id="tuin-wrapper">
  <div id="tuin-container">
    <div id="tuin" onclick="handleMapClick(event)"></div>
  </div>
</div>

<div id="form-popup">
  <h3>Plant bewerken</h3>
  <label>Naam</label>
  <input type="text" id="input-name" placeholder="Bijv. roosje">
  
  <label>Type</label>
  <select id="input-type">
    <option value="roos">Roos</option>
    <option value="struik">Struik</option>
    <option value="vasteplant">Vaste plant</option>
    <option value="boom">Boom</option>
    <option value="anders">Anders</option>
  </select>
  
  <label>Grootte symbool</label>
  <input type="range" id="input-size" min="10" max="80" value="22">
  
  <label>Kleur</label>
  <input type="color" id="input-color">
  
  <label>Extra info</label>
  <textarea id="input-extra" rows="2" placeholder="Bv. houdt van zon"></textarea>
  
  <label>Foto (optioneel)</label>
  <input type="file" id="input-photo" accept="image/*">
  <div id="photo-preview"></div>
  
  <div class="form-buttons">
    <button id="savePlantBtn">Opslaan</button>
    <button id="cancelBtn" style="background:#6b7280">Annuleren</button>
  </div>
</div>

<template id="plant-template">
  <div class="plant-wrapper">
    <div class="plant"></div>
    <div class="delete-btn">&times;</div>
  </div>
</template>

<div id="gallery" class="white-text">
  <h2>Galerij van planten</h2>
  <div class="gallery-grid" id="gallery-grid"></div>
</div>

<script>
// CONTROLEER OF DEZE URL KLOPT MET JE NIEUWSTE IMPLEMENTATIE
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzRmKdyA0Gs3hQ-Qzl9kom0hpc0mSnmXq0P-4zfyMjTqPGPpTaNsaAfDvrqfs-keFHtQA/exec";

let plants = [];
let editMode = false;
let isDragging = false;
let dragNode = null;
let panzoomInstance = null;
let tempPos = null;
let editingId = null;
let hasMoved = false;
let tooltip = null;

const typeMeta = {
  roos:       { color: '#f8a3a8', icon: 'R' }, // Zacht roze
  struik:     { color: '#e2cfb6', icon: 'S' }, // Warm beige
  vasteplant: { color: '#b5d491', icon: 'V' }, // Pastel groen
  boom:       { color: '#8eb897', icon: 'B' }, // Salie groen
  anders:     { color: '#cfdbd5', icon: 'A' }  // Licht grijs
};

const tuinEl = document.getElementById('tuin');
const containerEl = document.getElementById('tuin-container');
const filterInput = document.getElementById('filter-input');
const inputPhoto = document.getElementById('input-photo');
const photoPreview = document.getElementById('photo-preview');
const galleryGrid = document.getElementById('gallery-grid');
const sizeInput = document.getElementById('input-size');

function initPanzoom() {
  panzoomInstance = Panzoom(containerEl, { maxScale: 4, minScale: 0.5, contain: 'outside' });
}
initPanzoom();

function showTooltip(html, wrapper) {
  if (editMode) return;
  if (!tooltip) {
    tooltip = document.createElement('div');
    tooltip.className = 'tooltip';
    document.body.appendChild(tooltip);
  }
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  const rect = wrapper.getBoundingClientRect();
  tooltip.style.left = (rect.right + 10 + window.scrollX) + 'px';
  tooltip.style.top = (rect.top + window.scrollY) + 'px';
}
function hideTooltip() { if (tooltip) tooltip.style.display = 'none'; }

filterInput.addEventListener('input', applyFilter);

function applyFilter() {
  const val = filterInput.value.trim().toLowerCase();
  tuinEl.querySelectorAll('.plant-wrapper').forEach(w => {
    const name = w.dataset.name || '';
    w.style.display = name.includes(val) ? '' : 'none';
  });
  refreshGallery(val);
}

function refreshGallery() {
  const grid = document.getElementById('gallery-grid');
  grid.innerHTML = '';
  
  // Nette namen voor de categorieën
  const categoryLabels = {
    roos: 'Rozen',
    struik: 'Struiken',
    vasteplant: 'Vaste planten',
    boom: 'Bomen',
    anders: 'Overige'
  };

  const types = ['roos', 'struik', 'vasteplant', 'boom', 'anders'];
  
  types.forEach(type => {
    const plantsOfType = plants.filter(p => p.type === type);
    if (plantsOfType.length === 0) return;

    // Filteren op unieke namen (hoofdletterongevoelig)
    const uniquePlants = [];
    const seenNames = new Set();

    plantsOfType.forEach(p => {
      const nameKey = (p.name || 'Naamloos').toLowerCase().trim();
      if (!seenNames.has(nameKey)) {
        seenNames.add(nameKey);
        uniquePlants.push(p);
      }
    });

    // Sectie maken voor de categorie
    const typeSection = document.createElement('div');
    typeSection.style.width = '100%';
    typeSection.style.marginBottom = '30px';
    
    // De titel (bijv. "Rozen" ipv "Rooss")
    typeSection.innerHTML = `
      <h3 class="white-text" style="border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 8px;">
        ${categoryLabels[type]}
      </h3>
    `;
    
    const row = document.createElement('div');
    row.style.display = 'flex';
    row.style.flexWrap = 'wrap';
    row.style.gap = '20px';
    row.style.marginTop = '15px';

    uniquePlants.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.width = '160px'; 
      card.innerHTML = `
        ${p.photo ? `<img src="${p.photo}">` : `<div style="height:120px; background:#f0f0f0; border-radius:6px; display:flex; align-items:center; justify-content:center; color:#999; font-size:12px;">Geen foto</div>`}
        <div style="margin-top:10px; font-weight:bold; color:#333; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
          ${p.name || 'Naamloos'}
        </div>
      `;
      card.onclick = () => openForm(p);
      row.appendChild(card);
    });

    typeSection.appendChild(row);
    grid.appendChild(typeSection);
  });
}

function renderPlant(plant) {
  const tpl = document.getElementById('plant-template');
  const wrapper = tpl.content.firstElementChild.cloneNode(true);
  const plantEl = wrapper.querySelector('.plant');
  const meta = typeMeta[plant.type] || typeMeta.anders;
  
  // 1. Bereken de schaalbare grootte (cqw)
  const size = parseInt(plant.size) || 22;
  const relativeSize = (size / 10).toFixed(2) + 'cqw';

  // 2. Pas de positie toe
  wrapper.style.left = (plant.x * 100) + '%';
  wrapper.style.top = (plant.y * 100) + '%';
  wrapper.dataset.name = (plant.name || '').toLowerCase();
  
  // 3. Aquarel & Schaalbare styling
  plantEl.style.width = relativeSize;
  plantEl.style.height = relativeSize;
  plantEl.style.backgroundColor = plant.color || meta.color;
  plantEl.style.opacity = "0.65"; 
  
  // 4. De letter ook schaalbaar maken
  const letter = plant.type.charAt(0).toUpperCase();
  plantEl.textContent = letter; 
  plantEl.style.fontSize = (size / 18).toFixed(2) + 'cqw';
  plantEl.style.textShadow = "1px 1px 2px rgba(0,0,0,0.3)";

  plantEl.setAttribute('data-id', plant.id);

  // Tooltip & Events
  wrapper.addEventListener('mouseenter', () => {
    let html = `<div><strong>${plant.name || 'Naamloos'}</strong></div>`;
    if (plant.extra) html += `<div style="margin-top:4px; font-style:italic;">${plant.extra}</div>`;
    if (plant.photo) html += `<div style="margin-top:6px;"><img src="${plant.photo}" style="max-width:150px; border-radius:4px;"></div>`;
    showTooltip(html, wrapper);
  });
  wrapper.addEventListener('mouseleave', hideTooltip);

  plantEl.onclick = (e) => { e.stopPropagation(); if (!hasMoved) { hideTooltip(); openForm(plant); } };
  wrapper.querySelector('.delete-btn').onclick = (e) => { 
    e.stopPropagation(); 
    plants = plants.filter(p => p.id !== plant.id); 
    hideTooltip(); refreshAll(); 
  };
  tuinEl.appendChild(wrapper);
}

function refreshAll() {
  tuinEl.innerHTML = '';
  plants.forEach(renderPlant);
  applyFilter();
}

sizeInput.oninput = () => {
  if (editingId) {
    const pEl = document.querySelector(`.plant[data-id="${editingId}"]`);
    if (pEl) {
      const s = sizeInput.value;
      const relSize = (s / 10).toFixed(2) + 'cqw';
      pEl.style.width = relSize; 
      pEl.style.height = relSize; 
      pEl.style.fontSize = (s / 18).toFixed(2) + 'cqw';
    }
  }
};

sizeInput.onmousedown = () => document.getElementById('form-popup').style.opacity = "0.5";
sizeInput.onmouseup = () => document.getElementById('form-popup').style.opacity = "1";

function openForm(plant = null) {
  editingId = plant ? plant.id : null;
  document.getElementById('input-name').value = plant ? plant.name : '';
  document.getElementById('input-type').value = plant ? plant.type : 'roos';
  sizeInput.value = plant ? (plant.size || 22) : 22;
  document.getElementById('input-color').value = plant ? (plant.color || typeMeta[plant.type].color) : typeMeta['roos'].color;
  document.getElementById('input-extra').value = plant ? plant.extra || '' : '';
  photoPreview.innerHTML = plant && plant.photo ? `<img src="${plant.photo}">` : '';
  inputPhoto.value = '';
  delete inputPhoto.dataset.photo;
  document.getElementById('form-popup').style.display = 'block';
}

document.getElementById('savePlantBtn').onclick = () => {
  const name = document.getElementById('input-name').value.trim();
  const type = document.getElementById('input-type').value;
  const size = parseInt(sizeInput.value);
  const color = document.getElementById('input-color').value;
  const extra = document.getElementById('input-extra').value;
  const photo = inputPhoto.dataset.photo || (photoPreview.querySelector('img') ? photoPreview.querySelector('img').src : '');

  if (editingId) {
    Object.assign(plants.find(p => p.id === editingId), { name, type, size, color, extra, photo });
  } else if(tempPos) {
    plants.push({ id: crypto.randomUUID(), name, type, size, color, extra, photo, x: tempPos.x, y: tempPos.y });
  }
  document.getElementById('form-popup').style.display = 'none';
  refreshAll();
};

document.getElementById('cancelBtn').onclick = () => { document.getElementById('form-popup').style.display = 'none'; refreshAll(); };

function handleMapClick(event) {
  if (!editMode || isDragging || hasMoved || event.target.closest('.plant')) return;
  const rect = tuinEl.getBoundingClientRect();
  tempPos = { x: (event.clientX - rect.left) / rect.width, y: (event.clientY - rect.top) / rect.height };
  openForm();
}

tuinEl.addEventListener('mousedown', (e) => {
  const pEl = e.target.closest('.plant');
  if (pEl && editMode) {
    isDragging = true; hasMoved = false;
    dragNode = { wrapper: pEl.parentElement, plantData: plants.find(p => p.id === pEl.getAttribute('data-id')) };
  }
});
window.addEventListener('mousemove', (e) => {
  if (!isDragging || !dragNode) return;
  hasMoved = true;
  const rect = tuinEl.getBoundingClientRect();
  let x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  let y = Math.max(0, Math.min(1, (e.clientY - rect.top) / rect.height));
  dragNode.wrapper.style.left = (x * 100) + '%';
  dragNode.wrapper.style.top = (y * 100) + '%';
  dragNode.plantData.x = x; dragNode.plantData.y = y;
});
window.addEventListener('mouseup', () => { if (isDragging) isDragging = false; });

document.getElementById('editMapBtn').onclick = () => {
  editMode = !editMode;
  const btn = document.getElementById('editMapBtn');
  if (editMode) {
    btn.textContent = 'Stop Edit (Zoom aan)'; btn.style.background = '#dc2626';
    document.getElementById('tuin-wrapper').classList.add('editing');
    if(panzoomInstance) panzoomInstance.destroy(); 
  } else {
    btn.textContent = 'Edit map (Slepen & Toevoegen)'; btn.style.background = '#2563eb';
    document.getElementById('tuin-wrapper').classList.remove('editing');
    initPanzoom();
  }
};

inputPhoto.addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    photoPreview.innerHTML = `<img src="${ev.target.result}">`;
    inputPhoto.dataset.photo = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// --- DE BELANGRIJKE ASYNC FUNCTIES ---
async function loadFromSheet() {
  const overlay = document.getElementById('loading-overlay');
  try {
    const r = await fetch(WEB_APP_URL);
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    plants = (d.data || []).map(p => ({
      id: p.id || crypto.randomUUID(),
      name: p.name || "",
      type: p.type || "anders",
      size: (p.size && !isNaN(p.size)) ? parseInt(p.size) : 22,
      color: p.color || "",
      extra: p.extra || "",
      photo: p.photo || "",
      x: parseFloat(p.x) || 0,
      y: parseFloat(p.y) || 0
    }));
    refreshAll();
    overlay.style.display = 'none';
  } catch(e) {
    overlay.innerHTML = "Fout bij laden. Check de URL.";
    console.error(e);
  }
}

document.getElementById('saveCloudBtn').onclick = async () => {
  const btn = document.getElementById('saveCloudBtn');
  const originalText = btn.textContent;
  btn.textContent = "Opslaan...";
  
  const dataToSave = plants.map(p => ({
    id: p.id, name: p.name, type: p.type, size: parseInt(p.size) || 22,
    color: p.color, extra: p.extra, photo: p.photo, x: p.x, y: p.y
  }));

  try {
    await fetch(WEB_APP_URL, { 
      method: 'POST', 
      headers: {"Content-Type":"text/plain"}, 
      body: JSON.stringify(dataToSave) 
    });
    alert("Opgeslagen!");
  } catch (e) {
    alert("Fout bij opslaan.");
  } finally {
    btn.textContent = originalText;
  }
};

loadFromSheet();
</script>
</body>
</html>
